<form [formGroup]="registrationForm" class="flex flex-col gap-4">
  <div>
    <label for="nickname">Nickname</label>
    <input id="nickname" formControlName="nickname" pInputText />
  </div>
  <div>
    <label for="email">Email</label>
    <input id="email" formControlName="email" pInputText />
  </div>
  <div>
    <label for="password">Password</label>
    <p-password id="password" formControlName="password" [toggleMask]="true" />
  </div>
  <div>
    <label for="confirmPassword">Confirm Password</label>
    <p-password
      id="confirmPassword"
      formControlName="confirmPassword"
      [toggleMask]="true"
    />
  </div>
  <div>
    <label for="phone">Phone</label>
    <input id="phone" formControlName="phone" pInputText />
  </div>
  <div>
    <label for="country">Country</label>
    <input id="country" formControlName="country" pInputText />
  </div>
  <p-button type="submit" (onClick)="onSubmit()">Submit</p-button>
</form>
